<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel M3U</title>

<style>
body{
font-family: Arial, sans-serif;
background:#0f172a;
color:#e2e8f0;
margin:0;
padding:20px;
}

.container{
max-width:400px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#1e293b;
color:white;
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:15px;
cursor:pointer;
transition:0.2s;
}

button:hover{
opacity:0.9;
}

.server{
background:#1e293b;
padding:12px;
margin-top:12px;
border-radius:10px;
}

.actions{
display:flex;
gap:6px;
margin-top:8px;
}

.copy{
flex:1;
background:#3b82f6;
font-size:12px;
padding:8px;
border-radius:6px;
}

.copy.copiado{
background:#22c55e;
}

.testar{
width:36px;
background:#334155;
border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

<h1>Painel M3U</h1>

<input id="user" placeholder="Usuário">
<input id="pass" placeholder="Senha">

<button onclick="gerar()">Gerar Links</button>

<div id="resultado"></div>

</div>

<script>

const servidores = [
{nome:"Seven", url:"http://sev.ontv.fun"},
{nome:"Galaxy", url:"http://x25.acxll.shop"},
{nome:"Explosion", url:"http://mainxs.site:80"},
{nome:"Lunar", url:"http://prd.blc-atena.com"},
{nome:"Speed", url:"http://spd.blc-atena.com"},
{nome:"Olympus", url:"http://olympus.netpl4y.com"},
{nome:"Tita", url:"http://tita.playblc.work"},
{nome:"Sky", url:"http://atbx.blc-atena.com"},
{nome:"Solar", url:"http://solar.playblc.work"},
{nome:"Urano", url:"http://od.blc-atena.com"},
{nome:"Atena", url:"http://atn.blc-atena.com"},
{nome:"Andromeda", url:"http://ifx.blc-atena.com"},
{nome:"Venus", url:"http://ntb.blc-atena.com"},
{nome:"Flash", url:"http://flash.netpl4y.com"},
{nome:"Fire", url:"http://e.ecps.blc-atena.com"}
];

function gerar(){

let user = document.getElementById("user").value;
let pass = document.getElementById("pass").value;

if(!user || !pass){
alert("Preencha usuário e senha");
return;
}

let resultado = document.getElementById("resultado");
resultado.innerHTML = "";

servidores.forEach((s,i)=>{

let link = `${s.url}/get.php?username=${user}&password=${pass}&type=m3u_plus&output=mpegts`;

let div = document.createElement("div");
div.className = "server";

div.innerHTML = `
<b>${s.nome}</b>
<div style="font-size:11px;margin-top:6px;word-break:break-all">${link}</div>

<div class="actions">
<button id="m3u${i}" class="copy">Copiar</button>
<button id="dns${i}" class="copy">DNS</button>
<button class="testar" onclick="testar('${s.url}')">↗</button>
</div>
`;

resultado.appendChild(div);

// copiar M3U
document.getElementById(`m3u${i}`).onclick = function(){
navigator.clipboard.writeText(link);
this.innerText = "Copiado";
this.classList.add("copiado");

setTimeout(()=>{
this.innerText = "Copiar";
this.classList.remove("copiado");
},2000);
};

// copiar DNS
document.getElementById(`dns${i}`).onclick = function(){
navigator.clipboard.writeText(s.url);
this.innerText = "Copiado";
this.classList.add("copiado");

setTimeout(()=>{
this.innerText = "DNS";
this.classList.remove("copiado");
},2000);
};

});

}

function testar(url){
window.open(url, "_blank");
}

</script>

</body>
</html>
